<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #1a1f27;
      --bg-panel: #161b22;
      --bg-raised: #1c2230;
      --bg-hover: #21293a;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-muted: #7d8590;
      --text-faint: #484f58;
      --accent: #f0b429;
      --accent-dim: #2d2208;
      --green: #3fb950;
      --green-dim: #0d2116;
      --red: #f85149;
      --red-dim: #2d0f0e;
      --amber: #d29922;
      --radius: 6px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-ui: 'DM Sans', sans-serif;
    }
    body {
      background: #0a0e14;
      min-height: 100vh;
      font-family: var(--font-ui);
      font-size: 14px;
    }
    .sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-base);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dog-wrap { width: 60px; height: 50px; flex-shrink: 0; }
    .mood-judgemental .nose-g {
      animation: twitch 3.5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes twitch {
      0%,85%,100% { transform: translateX(0); }
      88% { transform: translateX(-1.5px); }
      91% { transform: translateX(1.5px); }
      94% { transform: translateX(-.8px); }
      97% { transform: translateX(0); }
    }
    .blink {
      animation: blink 5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .mood-judgemental .blink { animation: none; }
    @keyframes blink {
      0%,88%,100% { transform: scaleY(1); }
      93% { transform: scaleY(0.05); }
    }
    .tear { opacity: 0; }
    .mood-sad .tear { animation: teardrop 2.2s ease-in infinite; }
    @keyframes teardrop {
      0%   { transform: translateY(0); opacity: .9; }
      100% { transform: translateY(20px); opacity: 0; }
    }
    .header-text { flex: 1; min-width: 0; }
    .header-title { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .header-status { font-size: 14px; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }
    .header-status.happy { color: var(--green); }
    .header-status.sad { color: var(--red); }
    .header-status.judgemental { color: var(--amber); }
    .sidebar-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .btn-scan { width: 100%; padding: 8px 12px; background: var(--accent); color: #0d1117; border: none; border-radius: var(--radius); font-family: var(--font-mono); font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s; }
    .btn-scan:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-scan:active { transform: translateY(0); }
    .btn-scan.scanning { background: var(--bg-raised); color: var(--text-muted); cursor: default; }
    .section-label { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 2px; }
    .toggles { display: flex; flex-direction: column; gap: 2px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s; }
    .toggle-row:hover { background: var(--bg-hover); }
    .toggle-row.on .pill { background: var(--accent-dim); border-color: var(--accent); }
    .toggle-row.on .pill::after { transform: translateX(14px); background: var(--accent); }
    .toggle-label { font-size: 15px; color: var(--text-primary); font-family: var(--font-mono); user-select: none; }
    .pill { position: relative; width: 32px; height: 18px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 9px; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; }
    .pill::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: var(--text-faint); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .issues-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .issue-count { font-family: var(--font-mono); font-size: 13px; padding: 2px 6px; background: var(--red-dim); color: var(--red); border-radius: 4px; font-weight: 700; }
    .issue-count.zero { background: var(--green-dim); color: var(--green); }
    .issue-list { display: flex; flex-direction: column; gap: 3px;}
    .issue-item { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; padding: 7px 8px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.1s, background 0.1s; text-align: left; width: 100%; }
    .issue-item:hover { background: var(--bg-hover); border-color: var(--red); }
    .issue-tag { font-size: 12px; font-weight: 700; color: var(--red); background: var(--red-dim); padding: 1px 4px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; text-decoration: none; }
    .issue-tag:hover { text-decoration: underline; }
    .issue-tag.warn { color: var(--amber); background: #2d1f08; }
    .issue-msg { font-size: 14px; color: var(--text-primary); font-family: var(--font-mono); line-height: 1.4; }
    .empty-state { text-align: center; padding: 20px 0; color: var(--text-muted); font-family: var(--font-mono); font-size: 14px; }
    .invalidated-banner { padding: 10px 12px; background: var(--red-dim); color: var(--red); font-family: var(--font-mono); font-size: 13px; border-bottom: 1px solid var(--border); text-align: center; }
  </style>
</head>
